services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bootharness
      DB_USER: bootharness
      DB_PASSWORD: bootharness
      JWT_SECRET: local-dev-secret-change-in-production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bootharness
      POSTGRES_USER: bootharness
      POSTGRES_PASSWORD: bootharness
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bootharness"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
