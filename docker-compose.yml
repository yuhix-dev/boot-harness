# Development: starts PostgreSQL only.
# Run the app with: ./gradlew bootRun
#
# To start everything in one command (e.g. for a quick demo), use:
#   docker compose -f docker-compose.full.yml up
services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bootharness
      POSTGRES_USER: local
      POSTGRES_PASSWORD: local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
