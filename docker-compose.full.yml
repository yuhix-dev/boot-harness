# Full stack: starts the app and PostgreSQL together.
# Requires a .env file — copy .env.example and fill in the values:
#   cp .env.example .env
#
# Then run:
#   docker compose -f docker-compose.full.yml up
services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bootharness
      POSTGRES_USER: local
      POSTGRES_PASSWORD: local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
