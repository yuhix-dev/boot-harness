[rules]
prefix_rules = [
  { pattern = [{ token = "rm" }, { token = "-rf" }], decision = "forbidden", justification = "Prevent destructive deletes." },
  { pattern = [{ token = "rm" }, { token = "-fr" }], decision = "forbidden", justification = "Prevent destructive deletes." },
  { pattern = [{ token = "sudo" }], decision = "forbidden", justification = "Prevent privilege escalation." },
  { pattern = [{ token = "git" }, { token = "push" }, { token = "--force" }], decision = "forbidden", justification = "Prevent force pushes." },
  { pattern = [{ token = "git" }, { token = "push" }, { token = "--force-with-lease" }], decision = "forbidden", justification = "Prevent force pushes." },
  { pattern = [{ token = "git" }, { token = "reset" }, { token = "--hard" }], decision = "forbidden", justification = "Prevent destructive resets." },
  { pattern = [{ token = "git" }, { token = "push" }], decision = "prompt", justification = "Confirm before pushing changes." },
  { pattern = [{ token = "git" }, { token = "commit" }], decision = "prompt", justification = "Confirm before committing changes." },
  { pattern = [{ token = "./gradlew" }, { any_of = ["spotlessApply", "compileJava", "test"] }], decision = "prompt", justification = "Confirm before running Gradle tasks." }
]
